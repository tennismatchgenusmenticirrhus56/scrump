name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            cross: true
          # macOS
          - target: aarch64-apple-darwin
            runner: macos-latest
            cross: false
          - target: x86_64-apple-darwin
            runner: macos-latest
            cross: false
          # Windows
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            cross: false
            exe: .exe
          - target: aarch64-pc-windows-msvc
            runner: windows-latest
            cross: false
            exe: .exe
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: install cross (Linux cross-compiled targets only)
        if: matrix.cross
        run: cargo install cross --locked

      - name: build
        shell: bash
        run: |
          if [[ "${{ matrix.cross }}" == "true" ]]; then
            cross build --release --target ${{ matrix.target }} -p scrump-cli
          else
            cargo build --release --target ${{ matrix.target }} -p scrump-cli
          fi

      - name: package (unix)
        if: matrix.runner != 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME}"
          name="scrump-${ver}-${{ matrix.target }}"
          mkdir -p "dist/${name}"
          cp "target/${{ matrix.target }}/release/scrump" "dist/${name}/"
          cp README.md LICENSE CONTRIBUTING.md "dist/${name}/"
          ( cd dist && tar -czf "${name}.tar.gz" "${name}" && sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256" )

      - name: package (windows)
        if: matrix.runner == 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME}"
          name="scrump-${ver}-${{ matrix.target }}"
          mkdir -p "dist/${name}"
          cp "target/${{ matrix.target }}/release/scrump.exe" "dist/${name}/"
          cp README.md LICENSE CONTRIBUTING.md "dist/${name}/"
          ( cd dist && 7z a "${name}.zip" "${name}" >/dev/null && \
            sha256sum "${name}.zip" > "${name}.zip.sha256" )

      - name: upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: scrump-${{ matrix.target }}
          path: |
            dist/scrump-*.tar.gz*
            dist/scrump-*.zip*

  release:
    name: publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: flatten artifact tree
        run: |
          set -euo pipefail
          mkdir -p release
          find dist -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' \) -exec cp {} release/ \;
          ls -la release

      - name: create release + upload assets
        uses: softprops/action-gh-release@v3
        with:
          files: release/*
          generate_release_notes: true
          body: |
            ## Install

            Pick the right tarball for your platform from the assets below.

            ```sh
            # Linux x86_64
            curl -L -o scrump.tar.gz https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/scrump-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz

            tar -xzf scrump.tar.gz
            sudo install -m 755 scrump-${{ github.ref_name }}-x86_64-unknown-linux-gnu/scrump /usr/local/bin/
            scrump --version
            ```

            Or, from crates.io:

            ```sh
            cargo install scrump-cli
            ```

            Verify with the matching `*.sha256` file.

  publish-crates:
    name: publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    # crates.io publish order respects the internal dep DAG:
    #   tier-0 (no internal deps):           scrump-core
    #   tier-1 (depend on tier-0 only):       scrump-detect, scrump-rules,
    #     scrump-format-{core,hprof,jfr,passthrough,pcap,perf,sqlite}
    #   tier-2 (depend on a tier-1 format):   scrump-format-tar
    #   tier-3 (depends on tier-2):           scrump-format-nsys
    #   tier-4 (depends on everything):       scrump-cli
    # A short sleep between publishes lets the index propagate so the next
    # crate's resolver sees the version we just pushed.
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          # tier 0
          cargo publish -p scrump-core
          sleep 30
          # tier 1 — sequential to keep error reporting clean
          for c in scrump-detect scrump-rules \
                   scrump-format-core scrump-format-hprof scrump-format-jfr \
                   scrump-format-passthrough scrump-format-pcap \
                   scrump-format-perf scrump-format-sqlite; do
            cargo publish -p "$c"
            sleep 20
          done
          # tier 2
          cargo publish -p scrump-format-tar
          sleep 25
          # tier 3
          cargo publish -p scrump-format-nsys
          sleep 25
          # tier 4
          cargo publish -p scrump-cli
