# cargo-deny supply-chain config. Run locally with:
#
#   cargo install cargo-deny --locked
#   cargo deny check
#
# CI runs this on every push under the supply-chain job.

[graph]
all-features = true

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = []

[licenses]
# Allow-list approach: only licenses we've explicitly vetted are permitted.
# A new dep with anything else fails CI and forces a deliberate review.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "0BSD",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = [
    # `openssl-sys` pulls system OpenSSL — we prefer rustls for portability
    # of release binaries. Keep this list short; each entry should have a
    # one-line reason.
]
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
